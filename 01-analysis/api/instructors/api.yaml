openapi: "3.0.3"
info:
  title: Instructors API — «Шеф-стол»
  version: "0.1.0"

servers:
  - url: /api/v1

security:
  - Bearer: []

paths:
  /instructors/{instructorId}:
    get:
      operationId: getInstructor
      summary: Карточка шефа
      description: >
        Возвращает информацию о шефе: имя, статус, рейтинг, специализацию.
        Данные шефа полностью read-only для клиентского приложения (data-model.md §2.2).
        Управление шефами — вне скоупа, через админку.
      parameters:
        - name: instructorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Карточка шефа
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Instructor'
        '404':
          description: Шеф не найден
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
              example:
                code: "not_found"
                message: "Шеф не найден."

components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
