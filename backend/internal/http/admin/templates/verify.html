{{define "content"}}
<div class="login-box">
    <div class="card">
        <h1>Подтверждение входа</h1>
        <div class="alert alert-info">Dev-код подтверждения: <span class="code">123456</span></div>
        <form method="POST" action="/admin/login/verify">
            <input type="hidden" name="phone" value="{{.Phone}}">
            <div class="form-group">
                <label for="phone-display">Телефон</label>
                <input type="text" id="phone-display" value="{{.Phone}}" disabled>
            </div>
            <div class="form-group">
                <label for="code">Код подтверждения</label>
                <input type="text" id="code" name="code" placeholder="123456" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Подтвердить</button>
        </form>
    </div>
</div>
{{end}}
