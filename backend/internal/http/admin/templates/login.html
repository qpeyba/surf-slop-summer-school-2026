{{define "content"}}
<div class="login-box">
    <div class="card">
        <h1>Вход в админку</h1>
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input type="tel" id="phone" name="phone" value="+79999999999" placeholder="+79999999999" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
        </form>
        <p class="text-sm" style="margin-top:1rem; text-align:center;">Dev-режим: используйте телефон +79999999999</p>
    </div>
</div>
{{end}}
