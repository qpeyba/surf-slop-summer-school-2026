services:
  db:
    image: postgres:16-alpine
    profiles: ["db", "app", "migrations"]
    environment:
      POSTGRES_DB: chef_table
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: chef
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chef -d chef_table"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    profiles: ["app"]
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://chef:chef@db:5432/chef_table?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    image: golang:1.23-alpine
    profiles: ["migrations"]
    working_dir: /src
    environment:
      DATABASE_URL: "postgres://chef:chef@db:5432/chef_table?sslmode=disable"
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy
    command: go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir migrations postgres "postgres://chef:chef@db:5432/chef_table?sslmode=disable" up

volumes:
  postgres-data:
